# UniFi controller uses HTTPS internally — backend-protocol: HTTPS is required
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: unifi-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/backend-protocol: HTTPS
spec:
  tls:
    - secretName: unifi-tls
      hosts:
        - unifi.mortylabs.com
  rules:
  - host: unifi.mortylabs.com
    http:
      paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              name: unifi-tcp
              port:
                number: 8443
