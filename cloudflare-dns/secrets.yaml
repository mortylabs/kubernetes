#  This file is listed in .gitignore — never commit real credentials
# Generate a Cloudflare API token at: https://dash.cloudflare.com/profile/api-tokens
# Required permissions: Zone > DNS > Edit
apiVersion: v1
kind: Secret
metadata:
  name: ddns-secret-cloudflare-api-token
type: Opaque
stringData:
  CLOUDFLARE_API_TOKEN: CHANGEME_CLOUDFLARE_API_TOKEN
