#  This file is listed in .gitignore — never commit real credentials
# Use stringData (plaintext) — Kubernetes will base64-encode automatically
apiVersion: v1
kind: Secret
metadata:
  name: mqtt-pass
  labels:
    app: mqtt2influx
type: Opaque
stringData:
  password: CHANGEME_MQTT_PASSWORD
---
apiVersion: v1
kind: Secret
metadata:
  name: influx-pass
  labels:
    app: mqtt2influx
type: Opaque
stringData:
  password: CHANGEME_INFLUX_PASSWORD
