# replace 192.168.1.15 with the fixed IP of your NFS server
# replace /home/pi/k8sdata with the path to your NFS server folder
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-domoticz
spec:
  capacity:
    storage: 500M
  accessModes:
    - ReadWriteOnce
  nfs:
    path: /home/pi/k8sdata/domoticz
    server: 192.168.1.15
  persistentVolumeReclaimPolicy: Retain
  claimRef:
    namespace: default
    name: pvc-domoticz
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-domoticz
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 500M
