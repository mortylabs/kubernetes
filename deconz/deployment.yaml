apiVersion: apps/v1
kind: Deployment
metadata:
  name: deconz
  labels:
    app: deconz
spec:
  replicas: 1
  selector:
    matchLabels:
      app: deconz
  template:
    metadata:
      labels:
        app: deconz
    spec:
      hostNetwork: true
      containers:
      - name: deconz
        image: deconzcommunity/deconz
        imagePullPolicy: IfNotPresent
        ports:
          - containerPort: 80
          - containerPort: 443
          - containerPort: 5900
        env:
          - name: TZ
            value: Europe/London
          - name: DECONZ_DEVICE
            value: /dev/ttyACM1
        securityContext:
          privileged: true
        volumeMounts:
        - name: data-volume
          mountPath: /opt/deCONZ
        - name: dev-ttyacm1
          mountPath: /dev/ttyACM1
      volumes:
      - name: data-volume
        persistentVolumeClaim:
          claimName: pvc-deconz
      - name: dev-ttyacm1
        hostPath:
          path: /dev/ttyACM1
