#  This file is listed in .gitignore — never commit real credentials
# Use stringData (plaintext) — Kubernetes will base64-encode automatically
apiVersion: v1
kind: Secret
metadata:
  name: govee
  labels:
    app: govee2mqtt
type: Opaque
stringData:
  govee-email: CHANGEME_GOVEE_EMAIL
  govee-password: CHANGEME_GOVEE_PASSWORD
  govee-api-key: CHANGEME_GOVEE_API_KEY
  mqtt-password: CHANGEME_MQTT_PASSWORD
