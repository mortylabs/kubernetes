apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: govee2mqtt
  name: govee2mqtt
spec:
  replicas: 1
  selector:
    matchLabels:
      app: govee2mqtt
  template:
    metadata:
      labels:
        app: govee2mqtt
    spec:
      containers:
      - image: ghcr.io/wez/govee2mqtt:latest
        name: govee2mqtt
        imagePullPolicy: IfNotPresent
        securityContext:
          privileged: true
        ports:
          - name: govee-http
            containerPort: 8056
        env:
          - name: GOVEE_MQTT_HOST
            value: "192.168.1.15"    # ← replace with your MQTT broker IP
          - name: GOVEE_MQTT_PORT
            value: "31883"            # ← replace with your MQTT broker port (default: 1883)
          - name: GOVEE_MQTT_USER
            value: "mqtt_user"       # ← replace with your MQTT username
          - name: GOVEE_MQTT_PASSWORD
            valueFrom:
              secretKeyRef:
                name: govee
                key: mqtt-password
          - name: GOVEE_EMAIL
            valueFrom:
              secretKeyRef:
                name: govee
                key: govee-email
          - name: GOVEE_PASSWORD
            valueFrom:
              secretKeyRef:
                name: govee
                key: govee-password
          - name: GOVEE_API_KEY
            valueFrom:
              secretKeyRef:
                name: govee
                key: govee-api-key
          - name: GOVEE_TEMPERATURE_SCALE
            value: "C"
          - name: RUST_LOG_STYLE
            value: "always"
          - name: TZ
            value: "Europe/London"
